<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澪花 腹部コース｜インストラクター指導システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f5; --card:#ffffff; --accent:#c4523b; --accent-light:#f3e8e4;
  --text:#2c2420; --sub:#7a6e64; --border:#e8e0d8;
  --gold:#b8964e; --gold-light:#f5f0e4; --green:#5a8a5e; --green-light:#e8f0e8;
  --blue:#4a7a9a; --blue-light:#e4eef4; --purple:#7a5a8a; --purple-light:#f0e8f4;
  --red:#c45050; --red-light:#fceaea; --orange:#d4874e; --orange-light:#fdf3e8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Serif JP','Hiragino Mincho Pro',serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; }
button { font-family:inherit; cursor:pointer; }
input,textarea,select { font-family:inherit; }
.container { max-width:700px; margin:0 auto; padding:16px; }
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { background:var(--card); border-radius:20px; padding:48px 32px; max-width:400px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.08); text-align:center; }
.login-box h1 { color:var(--accent); font-size:22px; font-weight:600; margin:0 0 4px; }
.login-box .sub { color:var(--sub); font-size:14px; margin:0 0 28px; }
.login-input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--border); font-size:15px; background:var(--bg); text-align:center; outline:none; }
.login-btn { margin-top:14px; width:100%; padding:14px; border-radius:12px; background:var(--accent); color:#fff; border:none; font-size:16px; font-weight:600; }
.login-error { color:var(--red); font-size:13px; margin-top:12px; }
.login-loading { color:var(--sub); font-size:13px; margin-top:12px; }
.header { background:var(--card); border-bottom:2px solid var(--accent); position:sticky; top:0; z-index:100; }
.header-top { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; }
.header-brand { display:flex; align-items:center; gap:8px; color:var(--accent); font-weight:600; font-size:15px; }
.header-user { display:flex; align-items:center; gap:10px; }
.header-user span { font-size:13px; color:var(--sub); }
.header-user button { font-size:12px; color:var(--sub); background:none; border:none; text-decoration:underline; }
.tab-bar { display:flex; overflow-x:auto; padding:0 8px; }
.tab-bar button { flex:0 0 auto; padding:10px 12px; border:none; background:none; font-size:13px; color:var(--sub); white-space:nowrap; border-bottom:3px solid transparent; display:flex; align-items:center; gap:4px; }
.tab-bar button.active { color:var(--accent); font-weight:700; border-bottom-color:var(--accent); }
.card { background:var(--card); border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.05); margin-bottom:12px; }
.section-title { font-size:18px; font-weight:700; text-align:center; margin:8px 0 16px; }
.home-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.home-card { border-radius:16px; padding:20px 16px; border:none; text-align:left; }
.home-card .icon { font-size:28px; }
.home-card h3 { font-size:15px; font-weight:700; margin:8px 0 4px; }
.home-card p { color:var(--sub); font-size:12px; line-height:1.5; }
.mod-item { display:flex; align-items:center; gap:14px; padding:16px; background:var(--card); border:1px solid var(--border); border-radius:14px; text-align:left; width:100%; margin-bottom:8px; }
.mod-icon { width:48px; height:48px; border-radius:12px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.mod-num { background:var(--accent); color:#fff; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }
.mod-title { font-size:16px; font-weight:700; }
.point-row { display:flex; gap:12px; padding:12px 14px; border-radius:10px; margin-bottom:6px; }
.point-row:nth-child(odd) { background:rgba(243,232,228,0.4); }
.point-row:nth-child(even) { background:var(--bg); }
.point-num { color:var(--accent); font-weight:700; font-size:14px; min-width:24px; }
.point-text { font-size:15px; line-height:1.7; }
.step-cat { color:var(--accent); font-size:14px; font-weight:700; margin:0 0 6px; padding:0 4px; }
.step-item { display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; text-align:left; width:100%; margin-bottom:4px; }
.step-num { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.step-num.done { background:var(--green); color:#fff; }
.step-num.recheck { background:var(--orange); color:#fff; }
.step-num.default { background:var(--accent-light); color:var(--accent); }
.step-dots { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
.step-dot { width:7px; height:7px; border-radius:4px; }
.step-badge { display:inline-block; background:var(--accent-light); color:var(--accent); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600; margin-bottom:12px; }
.step-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.btn-done { padding:12px 24px; border-radius:12px; border:none; font-size:14px; font-weight:600; }
.btn-recheck { padding:12px 24px; border-radius:12px; border:none; font-size:14px; font-weight:600; }
.step-comment-area { width:100%; margin-top:8px; }
.step-comment-area textarea { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:14px; background:var(--bg); resize:vertical; line-height:1.6; min-height:60px; }
.step-nav { display:flex; gap:12px; justify-content:center; margin-top:16px; }
.step-nav button { padding:14px 28px; border-radius:12px; font-size:15px; }
.eval-score-row { margin-bottom:14px; }
.eval-label { font-size:14px; font-weight:600; margin-bottom:6px; }
.eval-btns { display:flex; gap:5px; flex-wrap:wrap; }
.eval-btn { padding:6px 10px; border-radius:8px; font-size:12px; }
.eval-btn.selected-low { background:#e8a090; color:#fff; border:none; font-weight:700; }
.eval-btn.selected-mid { background:var(--gold); color:#fff; border:none; font-weight:700; }
.eval-btn.selected-high { background:var(--green); color:#fff; border:none; font-weight:700; }
.eval-btn.unselected { background:transparent; color:var(--sub); border:1px solid var(--border); }
.about-section { margin-bottom:20px; }
.about-section h3 { color:var(--accent); font-size:15px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.about-point { padding:10px 14px; border-radius:10px; margin-bottom:6px; font-size:14px; line-height:1.7; }
.about-point.philosophy { background:var(--accent-light); }
.about-point.purpose { background:var(--blue-light); }
.about-point.importance { background:var(--gold-light); }
.about-point.boundary { background:var(--red-light); color:var(--red); font-weight:600; }
.report-score-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(232,224,216,0.2); }
@media(max-width:480px) { .home-grid { grid-template-columns:1fr; } .step-nav button { padding:12px 20px; font-size:14px; } }
</style>
</head>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw0EhGlPQwoqbz8Zw93pMItgn50TPvuyQR9ead8YDolUBgY6UoL4MdRZoL6QgSQzRQ5/exec";
</script>
<div id="app"></div>
<script>
let state = {view:"login",user:null,theoryMod:null,theoryTopic:null,practiceCur:0,practiceList:true,stepStatus:{},stepComments:{},reportScores:{},reportStudent:"",reportDate:new Date().toISOString().split("T")[0],reportComment:"",reports:[],reportsLoaded:false,saving:false,loginError:"",loginLoading:false};
function setState(patch){Object.assign(state,patch);render();}

const ABOUT={philosophy:["澪（みお）── 水の流れる道・生命の通り道・氣の通り道","花（はな）── 人それぞれが天より授かりし魂の彩。世に一つ 己が花を咲かすもの","澪花は己が身の内にある澪を整え、滞りを解きほぐし、天より授かりし氣を巡らせ、その人ならではの花を咲かせるための手あて"],purpose:["腹部コースは「臓に気づく」ための入口です","筋肉・内臓の生理学をベースに、五臓の基礎と腹部反射ゾーンを学びます","身体と心を五臓で感じ、痛くないアプローチで内臓の手あてをすることが目的です"],importance:["自律神経の中枢","生命を維持する臓器が集まる場所","怒り・悲しみ・不安 ── 言葉にならない感情が積み重なる場所"],boundaries:["腹部コースでは「臓に触れる」ところまでを学びます","「手を育む」ことは本講座（澪花メインコース）でのみ指導します ── 腹部コースでは教えないでください","エネルギーの使い方は腹部コースの範囲外です ── 指導しないでください","臓の触れ方・感じ方を丁寧に伝えることに集中してください"]};

const THEORY=[{id:"intro",title:"腹部の大切さ",icon:"🌸",topics:[{id:"t1",title:"腹部の大切さ",points:["自律神経の中枢","生命を維持する臓器が集まる","怒り・悲しみ・不安 — 言葉にならない感情が積み重なる場所"]},{id:"t2",title:"澪花腹部の手あて 〜臓に触れる〜",points:["腹部コースは「臓に気づく」ための入口","筋肉・内臓の生理学をベースに、五臓の基礎と腹部反射ゾーンを学ぶ"]}]},{id:"autonomic",title:"自律神経",icon:"⚡",topics:[{id:"a1",title:"神経の分類と働き",points:["神経とは、脳と身体の各器官が互いに情報を伝え合う道","情報を伝える神経は大きく分けて2つ：中枢神経と末梢神経","末梢神経は体制神経と自律神経に分けられる","体制神経 ── 意志でコントロールでき知覚や運動をつかさどる（知覚神経・運動神経）","自律神経 ── 意志とは無関係に体の機能を調整する"]},{id:"a2",title:"交感神経と副交感神経",points:["自律神経は正反対の作用をする交感神経と副交感神経がある","《交感神経》活動時、ストレスを受けた時 ── 心身を緊張・興奮状態に導く","《副交感神経》休息時、睡眠時 ── 心身をリラックスさせ、鎮静状態に導く","自律神経は1日を通してどちらかが必ず優位になっている","血管：交感神経→収縮 / 副交感神経→拡張","血圧：交感神経→上昇 / 副交感神経→下降","心拍：交感神経→速い / 副交感神経→ゆっくり","筋肉：交感神経→緊張 / 副交感神経→弛緩","腸：交感神経→ぜん動抑制 / 副交感神経→ぜん動促進","発汗：交感神経→促進 / 副交感神経→抑制"]},{id:"a3",title:"自律神経の分布",points:["自律神経の働きをする末梢神経の神経線維は脳神経、脊髄神経の中に含まれている","脳から出る12対の神経、脊髄から出る31対の神経がある","交感神経の神経節は脊椎の両側に並んでいて上下の神経節が神経線維で結ばれて交感神経幹を作っている","交感神経節は頸部で3対、胸部で10〜12対、腰部で4〜5対、仙骨部に4〜5対あり最下部は尾骨に1対ある"]},{id:"a4",title:"自律神経の乱れと症状",points:["自律神経は両方がしっかり機能することが整った状態","それぞれが正しく機能しないと自律神経の乱れた状態になる","自律神経の乱れは様々な辛い症状を引き起こす","【頭】不眠・イライラする・頭痛・気分が落ち込む・集中力が低下する","【目・耳・口】眼精疲労・耳鳴り・めまい、立ちくらみ・口渇（歯周病や虫歯のリスク）","【首・胸】首や肩のこり・息苦しさ・動悸・血圧が上がる","【胃・腸】吐き気・食欲不振・便秘、下痢・お腹が張る、ガスがたまる","【子宮・膀胱】月経不順・頻尿","【腰・手足】腰痛・手足がしびれる・手足が冷える","【全身】疲れやすい・ほてり・微熱・多汗","（うつ）うつ病は脳の神経伝達物質の分泌異常によって症状が現れる心の病気"]}]},{id:"braingut",title:"脳腸相関",icon:"🧠",topics:[{id:"bg1",title:"脳腸相関のしくみ",points:["脳と腸は神経で双方向に繋がっている（脳腸相関）","【遠心性神経（脳→腸）】ストレス→胃：消化管運動異常（食後のもたれ感、飽満感）、内臓知覚過敏（飽満感、膨満感、胃痛）","【求心性神経（腸→脳）】腸の不調→脳：心理的異常（不安、緊張、抑うつなど）","【腸の症状】消化管運動異常（便通異常）、内臓知覚過敏（下腹部痛、ガス、腹部膨満感）","セロトニン（幸せホルモン）：体内の90〜95%は腸管で作られる"]}]},{id:"muscle",title:"筋肉の基礎",icon:"💪",topics:[{id:"m1",title:"筋肉の分類",points:["骨格筋（横紋筋）── 随意筋：意識的に収縮させることが出来る","心筋（横紋筋）── 不随意筋：意識的に収縮させることが出来ない","内臓筋（平滑筋）── 不随意筋：意識的に収縮させることが出来ない","不随意筋は自律神経によってコントロールされる"]},{id:"m2",title:"筋肉の作用",points:["張力 ── 筋肉が収縮して力を生み出す","運動 ── 身体を動かす","姿勢保持 ── 重力に抗して姿勢を維持する","熱の産生 ── 体温を維持する"]},{id:"m3",title:"筋肉の構造",points:["骨格筋は筋繊維が多数集まったもの","個々の筋膜繊維の周囲には筋内膜（Endomysium）という結合組織がある","筋繊維が集まって束を作ると、その周囲は筋周膜（Perimysium）に包まれ1つの筋となる","筋全体は最外層の筋外膜（Epimysium / deep fascia）で覆われている","筋原線維（Myofibril）→筋形質（Sarcoplasm）→筋鞘（Sarcolemma）→単一筋線維→筋線維束（Fasciculus）→筋腹（Muscle belly）→腱（Tendon）"]},{id:"m4",title:"筋紡錘（きんぼうすい）",points:["筋肉の中に埋め込まれている感覚受容器","筋肉がどれくらい伸びているか、どれくらいの速さで伸びているかを感知している","筋肉が伸びる → 筋紡錘も一緒に引き伸ばされる → 感覚神経がその変化を検知 → 脳、脊髄に信号を送る","急に引き伸ばされた → 感知 → 筋肉収縮させて戻そう（伸張反射）"]}]},{id:"abmuscle",title:"腹部の筋肉",icon:"🏋️",topics:[{id:"ab1",title:"横隔膜",points:["呼吸の主動筋","胸腔と腹腔の間にあるドーム状の筋肉","肋骨、胸骨、腰椎から伸びている","【重要な3つの「穴」（裂孔）】横隔膜には、重要な血管や神経が通るための穴が開いている","大動脈裂孔 ── 大動脈が通る","食道裂孔 ── 食道が通る","下大静脈裂孔 ── 大静脈が通る","開口部：食道裂孔、大動脈裂孔、下大静脈裂孔があり重要な血管や神経が通る"]},{id:"ab2",title:"外腹斜筋",points:["浅層の筋肉。側腹では一番表層","体幹の側屈、回旋、屈曲に関わる","内腹斜筋とは回旋方向が反対側になる（回旋反対側）","《起始部》第5〜12肋骨の外面","《停止部》鼠経靭帯、腸骨稜の外唇、腹直筋鞘"]},{id:"ab3",title:"腹直筋",points:["表層にある筋肉で筋腹が上下に4〜5段に分かれている","上体を屈曲する筋肉 ── 体幹の屈曲に関わる","《起始部》恥骨結合","《停止部》第5〜7肋軟骨"]},{id:"ab4",title:"内腹斜筋",points:["外腹斜筋の深層にある筋肉","腸骨稜を中心に扇状の筋繊維が外腹斜筋と直角に走る","体幹の回旋、側屈、屈曲に関わる（回旋方向）","《起始部》上前腸骨棘、鼠経靭帯、腸骨稜","《停止部》第10肋骨〜12、腹直筋鞘"]},{id:"ab5",title:"腹横筋",points:["内腹斜筋に覆われも側腹の一番深層にある","息を吐くときの主力筋","《起始部》第7〜12肋軟骨、腸骨稜","《停止部》白線（Linea alba）"]},{id:"ab6",title:"腹壁の構造（断面）",points:["皮膚（Skin）","皮下組織（Subcutaneous tissue）","浅腹筋膜（Superficial abdominal fascia）","外腹斜筋（External oblique）","内腹斜筋（Internal oblique）","腹横筋（Transversus abdominis）","横筋筋膜（Transversalis fascia）","壁側腹膜（Parietal peritoneum）","中央に腹直筋（Rectus abdominis）と腹直筋鞘、白線（Linea alba）がある"]},{id:"ab7",title:"腹筋群まとめ",points:["外腹斜筋 ── 最表層、斜め下方向の繊維","腹直筋 ── 正中、縦方向の繊維（4〜5段に分節）","内腹斜筋 ── 中間層、外腹斜筋と直角の繊維","腹横筋 ── 最深層、横方向の繊維"]}]},{id:"peritoneum",title:"腹膜と膜構造",icon:"🫧",topics:[{id:"p1",title:"壁側腹膜・大網・臓側腹膜",points:["壁側腹膜 ── 腹壁の内側を覆う膜","大網 ── 胃から垂れ下がるエプロン状の膜（胃結腸間膜）","臓側腹膜 ── 内臓の表面を覆う膜","壁側腹膜→大網→臓側腹膜の順に層をなす"]}]},{id:"organs1",title:"内臓①（心肺・肝胆膵）",icon:"🫀",topics:[{id:"o1",title:"心臓",points:["【主な働き】血液を全身に巡らせる","グルコース（糖）、遊離脂肪酸、乳酸をエネルギー源とする"]},{id:"o2",title:"肺",points:["【主な働き】酸素を取り込む","二酸化炭素を排出する臓器"]},{id:"o3",title:"肝臓",points:["【主な働き】血液貯蔵・解毒・胆汁生成・代謝","総肝動脈が通る","小網（肝臓と胃を繋ぐ薄い膜）で胃と連結している"]},{id:"o4",title:"胆嚢",points:["【主な働き】胆汁貯蔵（凝縮）","消化補助 ── 脂肪の消化を助ける胆汁を十二指腸に送る"]},{id:"o5",title:"膵臓",points:["消化酵素を分泌（外分泌機能）","インスリンを分泌し血糖を調整（内分泌機能）"]},{id:"o6",title:"十二指腸",points:["小腸の最初の部分","胆汁と膵液が合流する消化の要"]}]},{id:"organs2",title:"内臓②（胃・脾・腸）",icon:"🫁",topics:[{id:"o7",title:"胃",points:["【主な働き】消化・吸収","小網で肝臓と連結、大網が胃から垂れ下がる","横行結腸と繋がる膜がある（脾・胃・横行結腸）","小彎（胃の右側の短い縁）と大湾（胃の左側の長い縁）"]},{id:"o8",title:"脾臓",points:["【主な働き】消化、吸収、水分代謝","古くなった赤血球を壊す","血小板の貯蔵庫","免疫に関わる"]},{id:"o9",title:"小腸",points:["【主な働き】食べ物を消化・栄養吸収・食べ物を大腸に運ぶ","空腸（上部）と回腸（下部）に分かれる","腸間膜で後腹壁と連結している"]},{id:"o10",title:"大腸",points:["【主な働き】水分吸収・不要なものを便で排出","自律神経との関係が深い","免疫司令塔 ── 免疫細胞の多くが大腸に存在","構成：横行結腸・上行結腸・下行結腸・S状結腸・盲腸・虫垂・直腸"]}]},{id:"organs3",title:"内臓③（腎・膀胱・生殖器）",icon:"🌿",topics:[{id:"o11",title:"腎臓",points:["【主な働き】血液から老廃物を取り除く","体内の水分量と電解質を保つ","体内の水分量と塩分のバランスを保つ","ホルモン分泌","右腎臓は肝臓・十二指腸・大網・上行結腸・横行結腸に囲まれ、横隔膜の下に位置する（臍の高さ）"]},{id:"o12",title:"副腎",points:["腎臓の上に乗っている小さな臓器","【主な働き】血圧、血糖の調整","電解質の調整","性ホルモンの補助"]},{id:"o13",title:"膀胱",points:["【主な働き】尿を溜める","排尿を筋肉でコントロールする"]},{id:"o14",title:"子宮・卵管・卵巣",points:["子宮 ── 受精した卵子を受け取り胎児を育てる","卵管 ── 卵子と精子が受精する場所","卵巣 ── 女性ホルモンを分泌"]},{id:"o15",title:"生殖部（断面の構造）",points:["前方から：恥骨 → 膀胱 → 尿道 → 陰核（クリトリス）→ 尿道口","中央：子宮 → 子宮内腔 → 子宮内膜 → 子宮口 → 腟 → 腟口","後方：卵管 → 卵巣 → 直腸 → 肛門","外陰部：大陰唇・小陰唇・会陰"]}]},{id:"diagnosis",title:"腹診・評価",icon:"🔍",topics:[{id:"d1",title:"鼓音チェック",points:["《チェック方法》","① 両手を上下に重ねる（利き手が上）","② 下の手は腹に沿わす","③ 上の手の指先で、舌の手の第一関節と第二関節の間を叩く","空気がある音がする場所に気の停滞がある","《溜まりやすい場所》結腸の脾曲、回盲部、結腸","《まとめ》","ガス、気の滞りは叩くとポンと音がする","腹部施術前にチェック → 施術後変化チェック","消化不良、ストレスが強い可能性あり","滞りで腹部の圧迫感や痛みを感じる方も居る"]},{id:"d2",title:"五臓",points:["【肝】（表裏：胆）── 疏泄を司る。貯蔵に関わる。目・耳・血液と関連","【心】（表裏：小腸）── 血脈と神を司る","【脾】（表裏：胃）── 運化を司る。血液と消化を支える","【肺】（表裏：大腸）── 気を司る","【腎】（表裏：膀胱）── 精を蔵し、成長・発育・生殖を主る。耳・骨・水分と関連","気は肺と脾が作る"]},{id:"d3",title:"澪診（腹部の五臓配置）",points:["腹部を触診して五臓の状態を把握する澪花独自の腹診法","【上部】みぞおち付近：中央に心、右に胆、左に脾","【中央上】胃","【左右 肋骨下】肝（左右両方に配置）","【中央】脾（大きく中央に位置）","【下腹部中央】腎","【左右下部（鼠径部付近）】お血（瘀血）── 血の滞り","【中央下部（臍下）】免疫と関連する領域","【左下腹部】肺と関連する領域"]},{id:"d4",title:"もつれとしこり",points:["【もつれ】","絡まり、ねじれ、組織間の滑走不全、エネルギーの絡み","【感触】ごわごわ、ぐにゃぐにゃ、触ると流れが悪い","【しこり】","固まり（石っぽい）、お血、気血水の滞りが強く圧縮された状態","【感触】硬い、動かない、押すとズーンと響く"]},{id:"d5",title:"腹診 臍センター（風門）",points:["臍（へそ）は臍の緒を通じて母と繋がっていた場所","腹部の邪気を臍に集め解放するために、トリートメントの始まりに門を開く","これを「風門」と呼ぶ","風門を開くことで、腹部全体のエネルギーの通り道を整える起点とする"]}]}];

async function apiAuth(email){var res=await fetch(GAS_URL+"?action=auth&email="+encodeURIComponent(email));return await res.json();}

function renderTheory(){if(state.theoryTopic){var mod,topic;for(var mi=0;mi<THEORY.length;mi++){var t=THEORY[mi].topics.find(function(x){return x.id===state.theoryTopic;});if(t){mod=THEORY[mi];topic=t;break;}}if(!topic)return"";return'<div class="container"><button style="background:none;border:none;color:var(--accent);font-size:14px;margin-bottom:12px;padding:0" onclick="setState({theoryTopic:null})">← 戻る</button><div class="card"><span style="font-size:13px;color:var(--accent);font-weight:600">'+mod.title+'</span><h2 style="font-size:20px;font-weight:700;margin:8px 0 20px;border-bottom:2px solid var(--accent);padding-bottom:12px">'+topic.title+'</h2>'+topic.points.map(function(p,i){return'<div class="point-row"><span class="point-num">'+(i+1)+'</span><span class="point-text">'+p+'</span></div>';}).join("")+'</div></div>';}if(state.theoryMod){var m=THEORY.find(function(x){return x.id===state.theoryMod;});return'<div class="container"><button style="background:none;border:none;color:var(--accent);font-size:14px;margin-bottom:12px;padding:0" onclick="setState({theoryMod:null})">← 一覧</button><div class="card"><h2 style="display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;margin-bottom:16px"><span style="font-size:28px">'+m.icon+'</span>'+m.title+'</h2>'+m.topics.map(function(t){return'<button style="display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;text-align:left;margin-bottom:8px" onclick="setState({theoryTopic:\''+t.id+'\'})"><div><span style="font-size:15px;font-weight:600">'+t.title+'</span><span style="color:var(--sub);font-size:12px;margin-left:8px">'+t.points.length+'項目</span></div><span style="color:var(--accent);font-size:18px">›</span></button>';}).join("")+'</div></div>';}return'<div class="container"><h2 class="section-title">理論教材</h2>'+THEORY.map(function(m,i){return'<button class="mod-item" onclick="setState({theoryMod:\''+m.id+ function renderPractice(){if(!state.practiceList){var s=STEPS[state.practiceCur];var st=state.stepStatus[s.id]||"";var cm=state.stepComments[s.id]||"";return'<div class="container"><button style="background:none;border:none;color:var(--accent);font-size:14px;padding:0;margin-bottom:8px" onclick="setState({practiceList:true})">← 一覧</button><div class="card" style="text-align:center;padding:28px 20px"><div class="step-dots">'+STEPS.map(function(_,i){var sid=STEPS[i].id;var ss=state.stepStatus[sid]||"";var col=i===state.practiceCur?"var(--accent)":ss==="done"?"var(--green)":ss==="recheck"?"var(--orange)":"var(--border)";return'<div class="step-dot" style="background:'+col+'"></div>';}).join("")+'</div><span class="step-badge">'+s.cat+'</span><h2 style="font-size:22px;font-weight:700;margin:8px 0 4px">Step '+(state.practiceCur+1)+' / '+STEPS.length+'</h2><h3 style="color:var(--accent);font-size:20px;font-weight:700;margin-bottom:16px">'+s.title+'</h3>'+(s.note?'<div style="background:var(--gold-light);border-radius:12px;padding:12px 16px;margin-bottom:16px;text-align:left"><p style="color:var(--gold);font-size:13px;font-weight:600;margin-bottom:4px">📌 ポイント</p><p style="font-size:14px;line-height:1.6">'+s.note+'</p></div>':'')+'<div class="step-actions"><button class="btn-done" style="background:'+(st==="done"?"var(--green)":"var(--border)")+';color:'+(st==="done"?"#fff":"var(--text)")+'" onclick="setStepStatus(\''+s.id+'\',\'done\')">✓ 完了</button><button class="btn-recheck" style="background:'+(st==="recheck"?"var(--orange)":"var(--border)")+';color:'+(st==="recheck"?"#fff":"var(--text)")+'" onclick="setStepStatus(\''+s.id+'\',\'recheck\')">↻ 再チェック</button></div>'+(st==="recheck"?'<div class="step-comment-area"><p style="font-size:13px;color:var(--orange);font-weight:600;margin-bottom:4px;text-align:left">⚠ 何が出来ていないか：</p><textarea placeholder="出来ていない点、次回の注意点を入力" onchange="setStepComment(\''+s.id+'\',this.value)">'+cm+'</textarea></div>':'')+(st==="done"&&cm?'<div style= function renderReport(){var evalCats={};EVALS.forEach(function(e){if(!evalCats[e.cat])evalCats[e.cat]=[];evalCats[e.cat].push(e);});return'<div class="container" style="padding-bottom:40px"><h2 class="section-title">指導報告書</h2><div class="card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><label style="font-size:12px;color:var(--sub);font-weight:600">生徒名 *</label><input style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:15px;background:var(--bg);margin-top:4px" value="'+state.reportStudent+'" onchange="state.reportStudent=this.value"></div><div><label style="font-size:12px;color:var(--sub);font-weight:600">日付</label><input type="date" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:15px;background:var(--bg);margin-top:4px" value="'+state.reportDate+'" onchange="state.reportDate=this.value"></div></div><p style="font-size:12px;color:var(--sub)">指導者：'+(state.user?state.user.name:"")+" ("+(state.user?state.user.email:"")+')</p></div>'+Object.keys(evalCats).map(function(cat){var items=evalCats[cat];return'<div class="card"><h3 style="color:var(--accent);font-size:14px;font-weight:700;margin-bottom:10px">'+cat+'</h3>'+items.map(function(item){return'<div class="eval-score-row"><p class="eval-label">'+item.label+'</p><div class="eval-btns">'+[1,2,3,4,5].map(function(v){var sel=state.reportScores[item.id]===v;var cls=sel?(v<=2?"selected-low":v<=3?"selected-mid":"selected-high"):"unselected";return'<button class="eval-btn '+cls+'" onclick="setReportScore(\''+item.id+'\','+v+')">'+v+" "+SL[v]+"</button>";}).join("")+'</div></div>';}).join("")+'</div>';}).join("")+'<div class="card"><h3 style="color:var(--accent);font-size:14px;font-weight:700;margin-bottom:8px">実技ステップメモ（再チェック分）</h3>'+(Object.keys(state.stepComments).filter(function(k){return state.stepComments[k];}).length>0?Object.keys(state.stepComments).filter(function(k){return state.ste async function loadReports(){try{var email=null;if(state.user&&state.user.email!=="wellness.soar@gmail.com"){email=state.user.email;}var res=await apiGetReports(email);if(res.success){setState({reports:res.reports,reportsLoaded:true});}}catch(e){console.error(e);setState({reportsLoaded:true});}}

function renderReports(){if(!state.reportsLoaded)return'<div class="container"><p style="text-align:center;color:var(--sub);padding:40px">読み込み中...</p></div>';if(state.selectedReport){var r=state.selectedReport;var scores=r.scores||{};var stepNotes=r.step_notes||{};var vals=Object.keys(scores).map(function(k){return scores[k];}).filter(function(v){return typeof v==="number";});var avg=vals.length>0?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):"—";return'<div class="container"><button style="background:none;border:none;color:var(--accent);font-size:14px;padding:0;margin-bottom:12px" onclick="setState({selectedReport:null})">← 一覧</button><div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><h2 style="font-size:20px;font-weight:700">'+r.student_name+'</h2><p style="color:var(--sub);font-size:13px;margin-top:4px">'+r.date+' ─ 指導者: '+r.instructor_name+'</p></div><div style="background:var(--accent-light);border-radius:12px;padding:8px 16px;text-align:center"><span style="font-size:20px;font-weight:700;color:var(--accent)">'+avg+'</span><span style="font-size:11px;color:var(--sub);display:block">平均</span></div></div>'+EVALS.map(function(item){var v=scores[item.id];if(!v)return"";var col=v<=2?"var(--red)":v<=3?"var(--gold)":"var(--green)";return'<div class="report-score-row"><span style="font-size:13px">'+item.label+'</span><span style="color:'+col+';font-weight:700;font-size:13px">'+v+" "+SL[v]+"</span></div>";}).join("")+(Object.keys(stepNotes).filter(function(k){return stepNotes[k];}).length>0?'<h3 style="color:var(--orange);font-size:14px;font-weight:700;margin-top:16px;margin-bottom:8px">実技ステップメモ</h3>'+Object.keys(stepNotes).filter(function(k){return stepNotes[k];}).map(function(id){var s=STEPS.find(function(x){return x.id===id;});return'<div style="padding:8px 12px;background:var(--orange-light);border-radius:8px;margin-bottom:6px"><span style="font-size:13px;font-weight:600;color:var(--orange)">'+(s?s.title:id)+'</span><p style="font-size:13px;margin-top:2px">'+stepNotes[id]+"</p></div>";}).join(""):"")+(r.comment?'<div style="margin-top:16px;background:var(--bg);border-radius:12px;padding:14px"><p style="color:var(--accent);font-size:13px;font-weight:600;margin-bottom:4px">コメント</p><p style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+r.comment+"</p></div>":"")+"</div></div>";}return'<div class="container"><h2 class="section-title">指導報告書 履歴</h2>'+(state.reports.length===0?'<div style="text-align:center;padding:40px;color:var(--sub)"><p style="font-size:32px;margin-bottom:8px">📋</p><p>まだ報告書がありません</p></div>':'<div style="display:flex;flex-direction:column;gap:8px">'+state.reports.map(function(r){var scores=r.scores||{};var vals=Object.keys(scores).map(function(k){return scores[k];}).filter(function(v){return typeof v==="number";});var avg=vals.length>0?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):"—";return'<button style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;text-align:left;width:100%" onclick="selectReport(JSON.parse(this.dataset.r))" data-r=\''+JSON.stringify(r).replace(/'/g,"&#39;")+'\'><div style="width:44px;height:44px;border-radius:22px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:16px;font-weight:700;color:var(--accent)">'+avg+'</span></div><div style="flex:1"><span style="font-size:15px;font-weight:700">'+r.student_name+'</span><div style="display:flex;gap:8px;margin-top:2px"><span style="color:var(--sub);font-size:12px">'+r.date+'</span><span style="color:var(--sub);font-size:12px">by '+r.instructor_name+"</span></div></div><span style=\"color:var(--accent);font-size:18px\">›</span></button>";}).join("")+"</div>")+"</div>";}

function selectReport(r){setState({selectedReport:r});}

render();
</script>
</body>
</html>
