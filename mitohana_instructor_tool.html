<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>澪花 腹部コース｜インストラクター指導システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f5; --card:#ffffff; --accent:#c4523b; --accent-light:#f3e8e4;
  --text:#2c2420; --sub:#7a6e64; --border:#e8e0d8;
  --gold:#b8964e; --gold-light:#f5f0e4; --green:#5a8a5e; --green-light:#e8f0e8;
  --blue:#4a7a9a; --blue-light:#e4eef4; --purple:#7a5a8a; --purple-light:#f0e8f4;
  --red:#c45050; --red-light:#fceaea; --orange:#d4874e; --orange-light:#fdf3e8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Serif JP','Hiragino Mincho Pro',serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; }
button { font-family:inherit; cursor:pointer; }
input,textarea,select { font-family:inherit; }
.container { max-width:700px; margin:0 auto; padding:16px; }
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { background:var(--card); border-radius:20px; padding:48px 32px; max-width:400px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.08); text-align:center; }
.login-logo { width:120px; height:120px; object-fit:contain; margin-bottom:12px; }
.login-box h1 { color:var(--accent); font-size:22px; font-weight:600; margin:0 0 4px; }
.login-box .sub { color:var(--sub); font-size:14px; margin:0 0 28px; }
.login-input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--border); font-size:15px; background:var(--bg); text-align:center; outline:none; }
.login-btn { margin-top:14px; width:100%; padding:14px; border-radius:12px; background:var(--accent); color:#fff; border:none; font-size:16px; font-weight:600; }
.login-error { color:var(--red); font-size:13px; margin-top:12px; }
.login-loading { color:var(--sub); font-size:13px; margin-top:12px; }
.header { background:var(--card); border-bottom:2px solid var(--accent); position:sticky; top:0; z-index:100; }
.header-top { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; }
.header-brand { display:flex; align-items:center; gap:8px; color:var(--accent); font-weight:600; font-size:15px; }
.header-logo { width:36px; height:36px; object-fit:contain; }
.header-user { display:flex; align-items:center; gap:10px; }
.header-user span { font-size:13px; color:var(--sub); }
.header-user button { font-size:12px; color:var(--sub); background:none; border:none; text-decoration:underline; }
.tab-bar { display:flex; overflow-x:auto; padding:0 8px; }
.tab-bar button { flex:0 0 auto; padding:10px 12px; border:none; background:none; font-size:13px; color:var(--sub); white-space:nowrap; border-bottom:3px solid transparent; display:flex; align-items:center; gap:4px; }
.tab-bar button.active { color:var(--accent); font-weight:700; border-bottom-color:var(--accent); }
.card { background:var(--card); border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.05); margin-bottom:12px; }
.section-title { font-size:18px; font-weight:700; text-align:center; margin:8px 0 16px; }
.home-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.home-card { border-radius:16px; padding:20px 16px; border:none; text-align:left; }
.home-card .icon { font-size:28px; }
.home-card h3 { font-size:15px; font-weight:700; margin:8px 0 4px; }
.home-card p { color:var(--sub); font-size:12px; line-height:1.5; }
.mod-item { display:flex; align-items:center; gap:14px; padding:16px; background:var(--card); border:1px solid var(--border); border-radius:14px; text-align:left; width:100%; margin-bottom:8px; }
.mod-icon { width:48px; height:48px; border-radius:12px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.mod-num { background:var(--accent); color:#fff; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }
.mod-title { font-size:16px; font-weight:700; }
.point-row { display:flex; gap:12px; padding:12px 14px; border-radius:10px; margin-bottom:6px; }
.point-row:nth-child(odd) { background:rgba(243,232,228,0.4); }
.point-row:nth-child(even) { background:var(--bg); }
.point-num { color:var(--accent); font-weight:700; font-size:14px; min-width:24px; }
.point-text { font-size:15px; line-height:1.7; }
.step-cat { color:var(--accent); font-size:14px; font-weight:700; margin:0 0 6px; padding:0 4px; }
.step-item { display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; text-align:left; width:100%; margin-bottom:4px; }
.step-num { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.step-num.done { background:var(--green); color:#fff; }
.step-num.recheck { background:var(--orange); color:#fff; }
.step-num.default { background:var(--accent-light); color:var(--accent); }
.step-dots { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
.step-dot { width:7px; height:7px; border-radius:4px; }
.step-badge { display:inline-block; background:var(--accent-light); color:var(--accent); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600; margin-bottom:12px; }
.step-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.btn-done { padding:12px 24px; border-radius:12px; border:none; font-size:14px; font-weight:600; }
.btn-recheck { padding:12px 24px; border-radius:12px; border:none; font-size:14px; font-weight:600; }
.step-comment-area { width:100%; margin-top:8px; }
.step-comment-area textarea { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:14px; background:var(--bg); resize:vertical; line-height:1.6; min-height:60px; }
.step-nav { display:flex; gap:12px; justify-content:center; margin-top:16px; }
.step-nav button { padding:14px 28px; border-radius:12px; font-size:15px; }
.eval-score-row { margin-bottom:14px; }
.eval-label { font-size:14px; font-weight:600; margin-bottom:6px; }
.eval-btns { display:flex; gap:5px; flex-wrap:wrap; }
.eval-btn { padding:6px 10px; border-radius:8px; font-size:12px; }
.eval-btn.selected-low { background:#e8a090; color:#fff; border:none; font-weight:700; }
.eval-btn.selected-mid { background:var(--gold); color:#fff; border:none; font-weight:700; }
.eval-btn.selected-high { background:var(--green); color:#fff; border:none; font-weight:700; }
.eval-btn.unselected { background:transparent; color:var(--sub); border:1px solid var(--border); }
.about-section { margin-bottom:20px; }
.about-section h3 { color:var(--accent); font-size:15px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.about-point { padding:10px 14px; border-radius:10px; margin-bottom:6px; font-size:14px; line-height:1.7; }
.about-point.philosophy { background:var(--accent-light); }
.about-point.purpose { background:var(--blue-light); }
.about-point.importance { background:var(--gold-light); }
.about-point.boundary { background:var(--red-light); color:var(--red); font-weight:600; }
.report-score-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(232,224,216,0.2); }

/* ===== 合格判定 ===== */
.verdict-box { border-radius:16px; padding:20px; margin-bottom:14px; text-align:center; border:2px solid; }
.verdict-box.pass { background:#e8f5e9; border-color:#5a8a5e; }
.verdict-box.fail { background:#fceaea; border-color:#c45050; }
.verdict-label { font-size:28px; font-weight:700; margin-bottom:4px; }
.verdict-label.pass { color:#5a8a5e; }
.verdict-label.fail { color:#c45050; }
.verdict-sub { font-size:13px; color:var(--sub); margin-top:4px; }
.verdict-stats { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.verdict-stat { background:rgba(255,255,255,0.7); border-radius:12px; padding:10px 16px; text-align:center; min-width:80px; }
.verdict-stat .num { font-size:22px; font-weight:700; }
.verdict-stat .lbl { font-size:11px; color:var(--sub); margin-top:2px; }
.genre-verdict-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.genre-verdict-item { border-radius:12px; padding:12px 14px; }
.genre-verdict-item.ok { background:var(--green-light); border:1px solid #5a8a5e44; }
.genre-verdict-item.ng { background:var(--red-light); border:1px solid #c4505044; }
.genre-verdict-item .g-name { font-size:12px; font-weight:700; margin-bottom:4px; }
.genre-verdict-item.ok .g-name { color:var(--green); }
.genre-verdict-item.ng .g-name { color:var(--red); }
.genre-verdict-item .g-score { font-size:20px; font-weight:700; }
.genre-verdict-item.ok .g-score { color:var(--green); }
.genre-verdict-item.ng .g-score { color:var(--red); }
.genre-verdict-item .g-status { font-size:11px; margin-top:2px; }
.hokou-list { background:var(--orange-light); border-radius:14px; padding:16px; margin-bottom:14px; }
.hokou-list h3 { color:var(--orange); font-size:14px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.hokou-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:#fff; border-radius:10px; margin-bottom:6px; border-left:3px solid var(--orange); }
.hokou-item .h-score { font-weight:700; color:var(--red); font-size:13px; min-width:28px; }
.hokou-item .h-label { font-size:13px; flex:1; }
.hokou-item .h-cat { font-size:11px; color:var(--sub); background:rgba(0,0,0,0.06); border-radius:6px; padding:2px 6px; }
.verdict-pending { text-align:center; padding:20px; color:var(--sub); font-size:14px; }
.cat-bar { height:6px; border-radius:3px; background:var(--border); margin-top:4px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:3px; }

@media(max-width:480px) { .home-grid { grid-template-columns:1fr; } .step-nav button { padding:12px 20px; font-size:14px; } .genre-verdict-grid { grid-template-columns:1fr; } }
</style>
</head>

const ABOUT={

const THEORY=[

    {id:"a1",title:"神経の分類と働き",points:["神経とは、脳と身体の各器官が互いに情報を伝え合う道","情報を伝える神経は大きく分けて2つ：中枢神経と末梢神経","末梢神経は体制神経と自律神経に分けられる","体制神経 ── 意志でコントロールでき知覚や運動をつかさどる（知覚神経・運動神経）","自律神経 ── 意志とは無関係に体の機能を調整する"]},
    {id:"a2",title:"交感神経と副交感神経",points:["自律神経は正反対の作用をする交感神経と副交感神経がある","《交感神経》活動時、ストレスを受けた時 ── 心身を緊張・興奮状態に導く","《副交感神経》休息時、睡眠時 ── 心身をリラックスさせ、鎮静状態に導く","自律神経は1日を通してどちらかが必ず優位になっている","血管：交感神経→収縮 / 副交感神経→拡張","血圧：交感神経→上昇 / 副交感神経→下降","心拍：交感神経→速い / 副交感神経→ゆっくり","筋肉：交感神経→緊張 / 副交感神経→弛緩","腸：交感神経→ぜん動抑制 / 副交感神経→ぜん動促進","発汗：交感神経→促進 / 副交感神経→抑制"]},

    {id:"ab2",title:"外腹斜筋",points:["浅層の筋肉","体幹の側屈・回旋・屈曲","起始：第5〜12肋骨の外面 / 停止：鼠経靭帯・腸骨稜・腹直筋鞘"]},

/* ===== 合格判定ロジック ===== */
const PASS_AVG = 4.0;   // 総合平均 4以上
const PASS_MIN = 3;     // 個別最低点 4以上（3以下で不合格）
const PASS_CAT_MIN = 3; // ジャンル平均 3以下で不合格

function calcVerdict(scores) {
  var entries = Object.entries(scores).filter(function(e){ return typeof e[1]==="number"; });
  if (entries.length === 0) return null;

  var vals = entries.map(function(e){ return e[1]; });
  var avg = vals.reduce(function(a,b){return a+b;},0) / vals.length;
  var minVal = Math.min.apply(null, vals);
  var minItem = entries.find(function(e){ return e[1]===minVal; });
  var minLabel = "";
  if (minItem) {
    var ev = EVALS.find(function(x){ return x.id===minItem[0]; });
    minLabel = ev ? ev.label : minItem[0];
  }

  // ジャンル別集計
  var catMap = {};
  entries.forEach(function(e){
    var ev = EVALS.find(function(x){ return x.id===e[0]; });
    var cat = ev ? ev.cat : "その他";
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(e[1]);
  });
  var catStats = {};
  Object.keys(catMap).forEach(function(cat){
    var cv = catMap[cat];
    var cavg = cv.reduce(function(a,b){return a+b;},0)/cv.length;
    var cmin = Math.min.apply(null, cv);
    catStats[cat] = {avg:cavg, min:cmin, count:cv.length};
  });

  // 補講対象：点数が3以下の項目
  var hokou = entries.filter(function(e){ return e[1] <= 3; }).map(function(e){
    var ev = EVALS.find(function(x){ return x.id===e[0]; });
    return {id:e[0], label:ev?ev.label:e[0], cat:ev?ev.cat:"", score:e[1]};
  }).sort(function(a,b){return a.score-b.score;});

  // 合格条件
  var avgPass = avg >= PASS_AVG;
  var minPass = minVal > PASS_MIN;
  var catPass = Object.values(catStats).every(function(c){ return c.avg > PASS_CAT_MIN; });
  var pass = avgPass && minPass && catPass;

  // 不合格理由
  var reasons = [];
  if (!avgPass) reasons.push("総合平均 "+avg.toFixed(1)+" < 4.0");
  if (!minPass) reasons.push("最低点 "+minVal+" ≤ 3（項目："+minLabel+"）");
  Object.keys(catStats).forEach(function(cat){
    if (catStats[cat].avg <= PASS_CAT_MIN) {
      reasons.push("「"+cat+"」ジャンル平均 "+catStats[cat].avg.toFixed(1)+" ≤ 3.0");
    }
  });

  return {pass:pass, avg:avg, minVal:minVal, minLabel:minLabel, catStats:catStats, hokou:hokou, reasons:reasons, total:vals.length};
}

      '<div class="step-actions">'+
      '<button class="btn-done" style="background:'+(st==="done"?"var(--green)":"var(--border)")+';color:'+(st==="done"?"#fff":"var(--text)")+'" onclick="setStepStatus(\'"+s.id+"\',\'done\')">✓ 完了</button>'+
      '<button class="btn-recheck" style="background:'+(st==="recheck"?"var(--orange)":"var(--border)")+';color:'+(st==="recheck"?"#fff":"var(--text)")+'" onclick="setStepStatus(\'"+s.id+"\',\'recheck\')">↻ 再チェック</button>'+
      '</div>'+
      (st==="recheck"?'<div class="step-comment-area"><p style="font-size:13px;color:var(--orange);font-weight:600;margin-bottom:4px;text-align:left">⚠ 何が出来ていないか：</p><textarea placeholder="出来ていない点、次回の注意点を入力" onchange="setStepComment(\'"+s.id+"\',this.value)">'+cm+'</textarea></div>':'')+
      (st==="done"&&cm?'<div style="background:var(--green-light);border-radius:10px;padding:10px 14px;margin-top:8px;text-align:left"><p style="font-size:12px;color:var(--green);font-weight:600">メモ：</p><p style="font-size:13px">'+cm+'</p></div>':'')+
      '<div class="step-nav">'+
      '<button style="border:1px solid var(--border);background:var(--bg);color:'+(state.practiceCur===0?"var(--border)":"var(--text)")+'" onclick="if('+state.practiceCur+'>0)setState({practiceCur:'+(state.practiceCur-1)+'})" '+(state.practiceCur===0?"disabled":"")+'>← 前へ</button>'+
      '<button style="border:none;background:'+(state.practiceCur===STEPS.length-1?"var(--border)":"var(--accent)")+';color:#fff;font-weight:600" onclick="if('+state.practiceCur+'<'+(STEPS.length-1)+')setState({practiceCur:'+(state.practiceCur+1)+'})" '+(state.practiceCur===STEPS.length-1?"disabled":"")+'>次へ →</button>'+
      '</div></div></div>';
  }
  var cats={};
  STEPS.forEach(function(s,i){if(!cats[s.cat])cats[s.cat]=[];cats[s.cat].push(Object.assign({},s,{i:i}));});
  return '<div class="container"><h2 class="section-title">実技プロトコル</h2>'+
    '<p style="color:var(--sub);font-size:13px;text-align:center;margin-bottom:16px">全'+STEPS.length+'ステップ</p>'+
    Object.keys(cats).map(function(cat){
      var items=cats[cat];
      return '<div style="margin-bottom:14px"><h3 class="step-cat">'+cat+'</h3>'+
        items.map(function(x){
          var st=state.stepStatus[x.id]||"";
          var cls=st==="done"?"done":st==="recheck"?"recheck":"default";
          return '<button class="step-item" onclick="setState({practiceCur:'+x.i+',practiceList:false})">'+
            '<span class="step-num '+cls+'">'+( st==="done"?"✓":st==="recheck"?"↻":x.i+1)+'</span>'+
            '<span style="flex:1;font-size:15px;font-weight:500">'+x.title+'</span>'+
            (state.stepComments[x.id]?'<span style="color:var(--orange);font-size:12px">📝</span>':'')+
            '<span style="color:var(--sub);font-size:16px">›</span></button>';
        }).join("")+'</div>';
    }).join("")+'</div>';
}

function setStepStatus(id,val){var s=Object.assign({},state.stepStatus);s[id]=s[id]===val?"":val;setState({stepStatus:s});}
function setStepComment(id,val){var c=Object.assign({},state.stepComments);c[id]=val;state.stepComments=c;}

/* ===== 報告書（評価入力） ===== */
function renderReport(){
  var evalCats={};
  EVALS.forEach(function(e){if(!evalCats[e.cat])evalCats[e.cat]=[];evalCats[e.cat].push(e);});
  var verdict=calcVerdict(state.reportScores);
  return '<div class="container" style="padding-bottom:40px"><h2 class="section-title">指導報告書</h2>'+
    '<div class="card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'+
    '<div><label style="font-size:12px;color:var(--sub);font-weight:600">生徒名 *</label>'+
    '<input style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:15px;background:var(--bg);margin-top:4px" value="'+state.reportStudent+'" onchange="state.reportStudent=this.value"></div>'+
    '<div><label style="font-size:12px;color:var(--sub);font-weight:600">日付</label>'+
    '<input type="date" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:15px;background:var(--bg);margin-top:4px" value="'+state.reportDate+'" onchange="state.reportDate=this.value"></div></div>'+
    '<p style="font-size:12px;color:var(--sub)">指導者：'+(state.user?state.user.name:"")+' ('+(state.user?state.user.email:"")+')</p></div>'+
    renderVerdictPreview(verdict)+
    Object.keys(evalCats).map(function(cat){
      var items=evalCats[cat];
      var catVerdict=verdict?verdict.catStats[cat]:null;
      var catBg=catVerdict?(catVerdict.avg<=3?"var(--red-light)":catVerdict.avg>=4?"var(--green-light)":""):"";
      return '<div class="card" style="border:'+(catVerdict&&catVerdict.avg<=3?"2px solid #c4505066":"1px solid var(--border)")+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<h3 style="color:var(--accent);font-size:14px;font-weight:700">'+cat+'</h3>'+
        (catVerdict?'<span style="font-size:12px;font-weight:700;color:'+(catVerdict.avg<=3?"var(--red)":catVerdict.avg>=4?"var(--green)":"var(--gold)")+'">'+catVerdict.avg.toFixed(1)+'点</span>':'')+
        '</div>'+
        items.map(function(item){
          var v=state.reportScores[item.id];
          return '<div class="eval-score-row">'+
            '<p class="eval-label">'+(v&&v<=3?'⚠ ':'')+item.label+'</p>'+
            '<div class="eval-btns">'+
            [1,2,3,4,5].map(function(sv){
              var sel=state.reportScores[item.id]===sv;
              var cls=sel?(sv<=2?"selected-low":sv<=3?"selected-mid":"selected-high"):"unselected";
              return '<button class="eval-btn '+cls+'" onclick="setReportScore(\'"+item.id+"\','+sv+')">'+ sv+" "+SL[sv]+'</button>';
            }).join("")+
            '</div></div>';
        }).join("")+'</div>';
    }).join("")+
    '<div class="card"><h3 style="color:var(--accent);font-size:14px;font-weight:700;margin-bottom:8px">実技ステップメモ（再チェック分）</h3>'+
    (Object.keys(state.stepComments).filter(function(k){return state.stepComments[k];}).length>0?
      Object.keys(state.stepComments).filter(function(k){return state.stepComments[k];}).map(function(id){
        var s=STEPS.find(function(x){return x.id===id;});
        var st=state.stepStatus[id]||"";
        return '<div style="padding:8px 12px;background:'+(st==="recheck"?"var(--orange-light)":"var(--green-light)")+';border-radius:8px;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:600;color:'+(st==="recheck"?"var(--orange)":"var(--green)")+'">'+( st==="recheck"?"↻":"✓")+" "+(s?s.title:id)+'</span>'+
          '<p style="font-size:13px;margin-top:2px">'+state.stepComments[id]+'</p></div>';
      }).join(""):
      '<p style="font-size:13px;color:var(--sub)">実技タブで記録したステップメモがここに表示されます</p>')+
    '</div>'+
    '<div class="card"><h3 style="color:var(--accent);font-size:14px;font-weight:700;margin-bottom:8px">コメント・申し送り</h3>'+
    '<textarea style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:var(--bg);resize:vertical;line-height:1.7;min-height:80px" placeholder="生徒への指導メモ、次回の課題など" onchange="state.reportComment=this.value">'+state.reportComment+'</textarea></div>'+
    '<button style="width:100%;padding:16px;border-radius:14px;background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:700" onclick="saveReport()" '+(state.saving?"disabled":"")+">"+(state.saving?"保存中...":"報告書を保存（スプレッドシートへ送信）")+"</button></div>";
}

/* ===== 合格判定プレビュー（報告書入力中） ===== */
function renderVerdictPreview(verdict){
  if(!verdict) return '<div class="card verdict-pending">📋 評価を入力すると合格判定が表示されます</div>';
  var scored=Object.keys(state.reportScores).filter(function(k){return typeof state.reportScores[k]==="number";}).length;
  var total=EVALS.length;
  var pct=Math.round(scored/total*100);
  var html='<div class="verdict-box '+(verdict.pass?"pass":"fail")+'">'+
    '<div class="verdict-label '+(verdict.pass?"pass":"fail")+'">'+
    (verdict.pass?"✓ 合格":"✗ 不合格")+'</div>'+
    (scored<total?'<div class="verdict-sub">入力済み '+scored+'/'+total+'項目（'+pct+'%）</div>':'')+
    (!verdict.pass&&verdict.reasons.length>0?
      '<div style="margin-top:10px;text-align:left">'+
      verdict.reasons.map(function(r){return '<p style="font-size:12px;color:var(--red);margin-top:4px">⚠ '+r+'</p>';}).join("")+
      '</div>':'')+
    '<div class="verdict-stats">'+
    '<div class="verdict-stat"><div class="num" style="color:'+(verdict.avg>=4?"var(--green)":"var(--red)")+'">'+verdict.avg.toFixed(1)+'</div><div class="lbl">総合平均</div></div>'+
    '<div class="verdict-stat"><div class="num" style="color:'+(verdict.minVal>3?"var(--green)":"var(--red)")+'">'+verdict.minVal+'</div><div class="lbl">最低点</div></div>'+
    '<div class="verdict-stat"><div class="num">'+scored+'</div><div class="lbl">入力項目</div></div>'+
    '</div></div>';

  // ジャンル別
  html+='<div class="genre-verdict-grid">';
  Object.keys(verdict.catStats).forEach(function(cat){
    var cs=verdict.catStats[cat];
    var ok=cs.avg>3;
    html+='<div class="genre-verdict-item '+(ok?"ok":"ng")+'">'+
      '<div class="g-name">'+(ok?"✓ ":"⚠ ")+cat+'</div>'+
      '<div class="g-score">'+cs.avg.toFixed(1)+'</div>'+
      '<div class="g-status" style="color:'+(ok?"var(--green)":"var(--red)")+'">'+(ok?"基準クリア":"要補講")+'</div>'+
      '<div class="cat-bar"><div class="cat-bar-fill" style="width:'+(cs.avg/5*100)+'%;background:'+(ok?"var(--green)":"var(--red)")+'"></div></div>'+
      '</div>';
  });
  html+='</div>';

  // 補講対象
  if(verdict.hokou.length>0){
    html+='<div class="hokou-list"><h3>📚 補講対象項目（スコア3以下）</h3>'+
      verdict.hokou.map(function(h){
        return '<div class="hokou-item">'+
          '<span class="h-score">'+ h.score+" "+SL[h.score]+'</span>'+
          '<span class="h-label">'+ h.label+'</span>'+
          '<span class="h-cat">'+h.cat+'</span></div>';
      }).join("")+
      '</div>';
  }
  return html;
}

function setReportScore(id,v){
  var s=Object.assign({},state.reportScores);
  s[id]=s[id]===v?undefined:v;
  setState({reportScores:s});
}

async function saveReport(){
  if(!state.reportStudent.trim()){alert("生徒名を入力してください");return;}
  setState({saving:true});
  try{
    var data={
      date:state.reportDate,
      instructor_email:state.user.email,
      instructor_name:state.user.name,
      student_name:state.reportStudent.trim(),
      scores:state.reportScores,
      step_notes:state.stepComments,
      comment:state.reportComment
    };
    var res=await apiSaveReport(data);
    if(res.success){
      alert("報告書をスプレッドシートに保存しました");
      setState({saving:false,reportScores:{},reportStudent:"",reportComment:"",stepStatus:{},stepComments:{},view:"reports",reportsLoaded:false});
      loadReports();
    }else{alert("保存エラー: "+(res.error||"不明"));setState({saving:false});}
  }catch(e){alert("通信エラー: "+e.message);setState({saving:false});}
}

async function loadReports(){
  try{
    var email=state.user.email;
    if(email==="wellness.soar@gmail.com"){email=null;}
    var res=await apiGetReports(email);
    if(res.success){setState({reports:res.reports,reportsLoaded:true});}
  }catch(e){console.error(e);setState({reportsLoaded:true});}
}

/* ===== 履歴・詳細 ===== */
function renderReports(){
  if(!state.reportsLoaded) return '<div class="container"><p style="text-align:center;color:var(--sub);padding:40px">読み込み中...</p></div>';
  if(state.selectedReport) return renderReportDetail(state.selectedReport);
  return '<div class="container"><h2 class="section-title">指導報告書 履歴</h2>'+
    (state.reports.length===0?
      '<div style="text-align:center;padding:40px;color:var(--sub)"><p style="font-size:32px;margin-bottom:8px">📋</p><p>まだ報告書がありません</p></div>':
      '<div style="display:flex;flex-direction:column;gap:8px">'+
      state.reports.map(function(r){
        var verdict=calcVerdict(r.scores||{});
        var avg=verdict?verdict.avg.toFixed(1):"—";
        var pass=verdict?verdict.pass:null;
        return '<button style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid '+(pass===true?"#5a8a5e55":pass===false?"#c4505055":"var(--border)")+';border-radius:14px;text-align:left;width:100%" onclick="selectReport(JSON.parse(this.dataset.r))" data-r=\''+JSON.stringify(r).replace(/'/g,"&#39;")+'\'>'+
          '<div style="width:44px;height:44px;border-radius:22px;background:'+(pass===true?"var(--green-light)":pass===false?"var(--red-light)":"var(--accent-light)")+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
          '<span style="font-size:14px;font-weight:700;color:'+(pass===true?"var(--green)":pass===false?"var(--red)":"var(--accent)")+'">'+
          (pass===true?"合格":pass===false?"不合格":avg)+'</span></div>'+
          '<div style="flex:1"><span style="font-size:15px;font-weight:700">'+r.student_name+'</span>'+
          '<div style="display:flex;gap:8px;margin-top:2px"><span style="color:var(--sub);font-size:12px">'+r.date+'</span><span style="color:var(--sub);font-size:12px">by '+r.instructor_name+'</span></div></div>'+
          '<span style="color:var(--accent);font-size:18px">›</span></button>';
      }).join("")+'</div>')+'</div>';
}

function renderReportDetail(r){
  var scores=r.scores||{};
  var stepNotes=r.step_notes||{};
  var verdict=calcVerdict(scores);
  var avg=verdict?verdict.avg.toFixed(1):"—";
  return '<div class="container"><button style="background:none;border:none;color:var(--accent);font-size:14px;padding:0;margin-bottom:12px" onclick="setState({selectedReport:null})">← 一覧</button>'+
    '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'+
    '<div><h2 style="font-size:20px;font-weight:700">'+r.student_name+'</h2><p style="color:var(--sub);font-size:13px;margin-top:4px">'+r.date+' ─ 指導者: '+r.instructor_name+'</p></div>'+
    '<div style="background:'+(verdict?verdict.pass?"var(--green-light)":"var(--red-light)":"var(--accent-light)")+';border-radius:12px;padding:8px 16px;text-align:center">'+
    '<span style="font-size:16px;font-weight:700;color:'+(verdict?verdict.pass?"var(--green)":"var(--red)":"var(--accent)")+'">'+
    (verdict?verdict.pass?"✓ 合格":"✗ 不合格":avg)+'</span>'+
    '<span style="font-size:11px;color:var(--sub);display:block">平均 '+avg+'</span></div></div>'+
    EVALS.map(function(item){
      var v=scores[item.id];
      if(!v)return"";
      var col=v<=2?"var(--red)":v<=3?"var(--gold)":"var(--green)";
      return '<div class="report-score-row">'+
        '<span style="font-size:13px">'+(v<=3?"⚠ ":"")+item.label+'</span>'+
        '<span style="color:'+col+';font-weight:700;font-size:13px">'+ v+" "+SL[v]+'</span></div>';
    }).join("")+'</div>'+
    (verdict?renderVerdictDetail(verdict):'')+
    (Object.keys(stepNotes).filter(function(k){return stepNotes[k];}).length>0?
      '<div class="card"><h3 style="color:var(--orange);font-size:14px;font-weight:700;margin-bottom:8px">実技ステップメモ</h3>'+
      Object.keys(stepNotes).filter(function(k){return stepNotes[k];}).map(function(id){
        var s=STEPS.find(function(x){return x.id===id;});
        return '<div style="padding:8px 12px;background:var(--orange-light);border-radius:8px;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:600;color:var(--orange)">'+( s?s.title:id)+'</span>'+
          '<p style="font-size:13px;margin-top:2px">'+stepNotes[id]+'</p></div>';
      }).join("")+'</div>':'')+
    (r.comment?'<div class="card"><p style="color:var(--accent);font-size:13px;font-weight:600;margin-bottom:4px">コメント</p><p style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+r.comment+'</p></div>':'')+
    '</div>';
}

function renderVerdictDetail(verdict){
  var html='<div class="genre-verdict-grid">';
  Object.keys(verdict.catStats).forEach(function(cat){
    var cs=verdict.catStats[cat];
    var ok=cs.avg>3;
    html+='<div class="genre-verdict-item '+(ok?"ok":"ng")+'">'+
      '<div class="g-name">'+(ok?"✓ ":"⚠ ")+cat+'</div>'+
      '<div class="g-score">'+cs.avg.toFixed(1)+'</div>'+
      '<div class="g-status" style="color:'+(ok?"var(--green)":"var(--red)")+'">'+(ok?"クリア":"要補講")+'</div>'+
      '<div class="cat-bar"><div class="cat-bar-fill" style="width:'+(cs.avg/5*100)+'%;background:'+(ok?"var(--green)":"var(--red)")+'"></div></div>'+
      '</div>';
  });
  html+='</div>';
  if(verdict.hokou.length>0){
    html+='<div class="hokou-list"><h3>📚 補講対象項目（スコア3以下）</h3>'+
      verdict.hokou.map(function(h){
        return '<div class="hokou-item">'+
          '<span class="h-score">'+ h.score+" "+SL[h.score]+'</span>'+
          '<span class="h-label">'+ h.label+'</span>'+
          '<span class="h-cat">'+h.cat+'</span></div>';
      }).join("")+'</div>';
  }
  return html;
}

function selectReport(r){setState({selectedReport:r});}

render();
</script>
</body>
</html>
